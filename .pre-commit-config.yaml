repos:
  # Block plaintext masking BED (curated IP) — commit only the encrypted .bed.enc.
  # Same guard as .githooks/pre-commit, for users who run `pre-commit`.
  - repo: local
    hooks:
      - id: no-plaintext-mask-bed
        name: no plaintext masking BED
        entry: Plaintext .bed masking files must not be committed. Encrypt with `python -m virome_classifier.cli.encrypt_mask` and commit the .bed.enc instead.
        language: fail
        files: '\.bed$'

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.1.0"
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.2.5

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: "3.1.2"
    hooks:
      - id: editorconfig-checker
        alias: ec
